<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Resultado</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ffffff;
			font-family: Arial, Helvetica, sans-serif;
		}

		.container {
			width: min(92vw, 900px);
			text-align: center;
			padding: 24px;
		}

		h1 {
			margin: 0 0 28px;
			font-size: clamp(2.5rem, 7vw, 5.5rem);
			color: #000000;
			font-weight: 800;
			letter-spacing: 0.04em;
		}

		.link-box {
			display: inline-block;
			max-width: 100%;
			padding: 16px 20px;
			border: 1px solid #000000;
			border-radius: 10px;
			color: #000000;
			text-decoration: none;
			font-size: clamp(1rem, 2.5vw, 1.25rem);
			word-break: break-all;
		}

		.link-box:hover {
			background: #f2f2f2;
		}

		.actions {
			display: flex;
			justify-content: center;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 22px;
		}

		.action-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 14px 22px;
			border: 1px solid #000000;
			border-radius: 8px;
			font-size: 1rem;
			font-weight: 700;
			text-decoration: none;
			cursor: pointer;
		}

		.action-button.back {
			background: #ffffff;
			color: #000000;
		}

		.action-button.copy {
			background: #000000;
			color: #ffffff;
		}

		.action-button:hover {
			opacity: 0.9;
		}

		.message {
			min-height: 1.2em;
			margin-top: 16px;
			font-size: 0.95rem;
			color: #000000;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>toma o seu curtinho</h1>
		<a class="link-box" href="{{ link_encurtado }}" target="_blank" rel="noopener noreferrer">{{ link_encurtado }}</a>
		<div class="actions">
			<a class="action-button back" href="/">voltar</a>
			<button class="action-button copy" type="button" onclick="copiarResultado()">copiar resultado</button>
		</div>
		<div class="message" id="message"></div>
	</main>

	<script>
		function copiarResultado() {
			const texto = {{ link_encurtado | tojson }};
			const mensagem = document.getElementById('message');

			if (navigator.clipboard && window.isSecureContext) {
				navigator.clipboard.writeText(texto).then(() => {
					mensagem.textContent = 'Link copiado para a área de transferência.';
				}).catch(() => {
					mensagem.textContent = 'Não foi possível copiar o link.';
				});
				return;
			}

			const textarea = document.createElement('textarea');
			textarea.value = texto;
			textarea.style.position = 'fixed';
			textarea.style.opacity = '0';
			document.body.appendChild(textarea);
			textarea.focus();
			textarea.select();

			try {
				document.execCommand('copy');
				mensagem.textContent = 'Link copiado para a área de transferência.';
			} catch (error) {
				mensagem.textContent = 'Não foi possível copiar o link.';
			}

			document.body.removeChild(textarea);
		}
	</script>
</body>
</html>
