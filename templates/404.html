<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Link não encontrado</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ffffff;
			font-family: Arial, Helvetica, sans-serif;
		}

		.container {
			width: min(92vw, 760px);
			text-align: center;
			padding: 24px;
		}

		h1 {
			margin: 0 0 18px;
			font-size: clamp(2.5rem, 7vw, 5rem);
			color: #000000;
			font-weight: 800;
			letter-spacing: 0.04em;
		}

		p {
			margin: 0 0 28px;
			font-size: clamp(1rem, 2.5vw, 1.25rem);
			color: #000000;
			line-height: 1.5;
		}

		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 14px 22px;
			border: 1px solid #000000;
			border-radius: 8px;
			background: #000000;
			color: #ffffff;
			text-decoration: none;
			font-size: 1rem;
			font-weight: 700;
		}

		.button:hover {
			opacity: 0.9;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>link não encontrado</h1>
		<p>O link encurtado que você tentou acessar não existe ou pode ter expirado.</p>
		<a class="button" href="/">voltar para a página inicial</a>
	</main>
</body>
</html>
